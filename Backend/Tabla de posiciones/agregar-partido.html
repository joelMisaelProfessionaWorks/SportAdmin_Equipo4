<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programar Partido - SportAdmin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: 
        linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.7) 100%),
        repeating-linear-gradient(0deg, #27ae60 0px, #27ae60 40px, #2ecc71 40px, #2ecc71 80px);
      font-family: 'Rajdhani', sans-serif;
    }

    .container {
      width: 950px;
      background: rgba(52, 195, 143, 0.95);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      border: 3px solid #5060cc;
    }

    .header {
      background: #1a1a1a;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-header {
      background: rgba(255,255,255,0.9);
      color: #111;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.3s;
    }

    .btn-header:hover {
      background: white;
      transform: translateY(-2px);
    }

    .jornada {
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    .content {
      padding: 40px 60px;
      position: relative;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem;
      color: #111;
      margin-bottom: 5px;
      text-align: center;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .subtitle {
      color: #1a1a1a;
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 30px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .vs-container {
      display: grid;
      grid-template-columns: 1fr 50px 1fr;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
      background: rgba(0,0,0,0.2);
      padding: 20px;
      border-radius: 12px;
      border: 2px solid rgba(0,0,0,0.3);
    }

    .vs-badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: white;
      text-align: center;
      text-shadow: 2px 2px 4px #000;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #111;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    select, input[type="date"], input[type="time"] {
      width: 100%;
      background: #111;
      border: 2px solid #1a1a1a;
      border-radius: 8px;
      padding: 12px 14px;
      color: white;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      outline: none;
      cursor: pointer;
    }

    .btn-generar {
      width: 100%;
      padding: 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 2px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      background: #111;
      color: white;
      border: 3px solid #2ecc71;
    }

    .btn-generar:hover {
      background: #2ecc71;
      color: #111;
      transform: translateY(-3px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="btn-header" onclick="location.href='roles-juego-tabla.html'">⬅ REGRESAR AL ROL</button>
      <div class="jornada">PROGRAMAR PARTIDO</div>
    </div>

    <div class="content">
      <h1>Crear Partido</h1>
      <p class="subtitle">Club Deportivo León Saltillo</p>

      <form id="formPartido">
        <!-- SECCIÓN DE EQUIPOS (LOCAL VS VISITANTE) -->
        <div class="vs-container">
          <div class="form-group">
            <label style="text-align: center; color: #111;">EQUIPO LOCAL</label>
            <select id="equipo_local" required>
              <option value="">Cargando equipos...</option>
            </select>
          </div>
          
          <div class="vs-badge">VS</div>
          
          <div class="form-group">
            <label style="text-align: center; color: #111;">EQUIPO VISITANTE</label>
            <select id="equipo_visitante" required>
              <option value="">Cargando equipos...</option>
            </select>
          </div>
        </div>

        <!-- SECCIÓN DE FECHA Y LUGAR -->
        <div class="form-row">
          <div class="form-group">
            <label>Fecha del Encuentro</label>
            <input type="date" id="fecha" required>
          </div>

          <div class="form-group">
            <label>Hora</label>
            <select id="hora" required>
              <option value="">Selecciona hora</option>
              <option value="07:00">07:00 AM</option>
              <option value="08:10">08:10 AM</option>
              <option value="09:00">09:00 AM</option>
              <option value="10:00">10:00 AM</option>
            </select>
          </div>

          <div class="form-group">
            <label>Cancha</label>
            <select id="cancha" required>
              <option value="">Selecciona cancha</option>
              <option value="CANCHA 1">CANCHA 1</option>
              <option value="CANCHA 2">CANCHA 2</option>
              <option value="CANCHA 3">CANCHA 3</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn-generar">
          GuardAR PARTIDO EN EL ROL
        </button>
      </form>
    </div>
  </div>

  <script>
    // Poner la fecha de hoy por defecto
    document.getElementById('fecha').valueAsDate = new Date();

    // 1. Cargar equipos en las DOS listas desplegables
    document.addEventListener("DOMContentLoaded", async () => {
      const selectLocal = document.getElementById('equipo_local');
      const selectVisitante = document.getElementById('equipo_visitante');
      
      try {
        const response = await fetch('obtener_equipos.php');
        const text = await response.text();
        const respuesta = JSON.parse(text);
        const equipos = respuesta.data; 
        
        let opcionesHTML = '<option value="">Selecciona un equipo</option>';
        
        if (equipos.length === 0) {
          opcionesHTML = '<option value="">No hay equipos registrados</option>';
        } else {
          equipos.forEach(equipo => {
            opcionesHTML += `<option value="${equipo.IdEquipo}">${equipo.Equipo}</option>`;
          });
        }

        // Inyectamos las opciones en ambos selects
        selectLocal.innerHTML = opcionesHTML;
        selectVisitante.innerHTML = opcionesHTML;

      } catch (error) {
        console.error("Error al cargar equipos:", error);
        selectLocal.innerHTML = '<option value="">Error al cargar</option>';
        selectVisitante.innerHTML = '<option value="">Error al cargar</option>';
      }
    });

    // 2. Enviar datos a PHP
    document.getElementById('formPartido').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const equipo_local = document.getElementById('equipo_local').value;
      const equipo_visitante = document.getElementById('equipo_visitante').value;
      const fecha = document.getElementById('fecha').value;
      const hora = document.getElementById('hora').value;
      const cancha = document.getElementById('cancha').value;

      // Validación extra en el navegador: no pueden ser el mismo equipo
      if (equipo_local === equipo_visitante) {
        alert('⚠️ Error de VAR: El equipo local y visitante no pueden ser el mismo.');
        return;
      }

      try {
        const response = await fetch('guardar_partido.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ equipo_local, equipo_visitante, fecha, hora, cancha })
        });

        const result = await response.json();

        if (result.success) {
          alert('✅ ' + result.mensaje);
          // Redirigir a la tabla general de roles de juego
          location.href = 'roles-juego-tabla.html';
        } else {
          alert('🚫 Error: ' + result.mensaje);
        }

      } catch (error) {
        alert('🚫 Error de conexión al guardar el partido.');
        console.error("Detalle:", error);
      }
    });
  </script>
</body>
</html>
