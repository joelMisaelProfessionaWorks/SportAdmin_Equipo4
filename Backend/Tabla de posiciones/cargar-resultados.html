<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargar Resultados - SportAdmin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.7) 100%), repeating-linear-gradient(0deg, #27ae60 0px, #27ae60 40px, #2ecc71 40px, #2ecc71 80px); font-family: 'Rajdhani', sans-serif; }
    .container { width: 900px; background: rgba(52, 195, 143, 0.95); border-radius: 16px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.6); border: 3px solid #5060cc; }
    .header { background: #1a1a1a; padding: 12px 20px; display: flex; justify-content: flex-end; }
    .jornada { color: white; font-weight: 700; font-size: 0.9rem; letter-spacing: 1px; }
    .content { padding: 50px 70px; position: relative; }
    .top-btn { position: absolute; top: 20px; left: 30px; background: rgba(255,255,255,0.9); color: #111; padding: 10px 20px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; color: #111; text-align: center; margin-bottom: 5px; }
    .subtitle { color: #1a1a1a; font-size: 0.85rem; font-weight: 600; text-align: center; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
    .partido-section { margin-bottom: 30px; }
    label { display: block; font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; color: #1a1a1a; margin-bottom: 10px; text-transform: uppercase; }
    select { width: 100%; background: #111; border: 2px solid #1a1a1a; border-radius: 8px; padding: 12px 14px; color: white; font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 600; outline: none; cursor: pointer; }
    .goles-section { margin: 30px 0; background: rgba(0,0,0,0.2); padding: 30px; border-radius: 12px; border: 2px solid rgba(0,0,0,0.3); }
    .goles-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; align-items: center; }
    .goles-input-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .equipo-label { font-size: 1.2rem; font-weight: 700; color: #111; letter-spacing: 1px; text-transform: uppercase; text-align: center; height: 30px; }
    .goles-input { width: 120px; background: white; border: 3px solid #111; border-radius: 8px; padding: 15px; color: #111; font-family: 'Bebas Neue', sans-serif; font-size: 3rem; text-align: center; font-weight: 700; outline: none; }
    .vs-divider { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: #111; margin-top: 30px; }
    .btn-row { display: flex; gap: 20px; margin-top: 30px; }
    .btn { flex: 1; padding: 16px; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 2px; border: none; border-radius: 10px; cursor: pointer; transition: all 0.3s; }
    .btn-cancel { background: rgba(255,255,255,0.8); color: #111; border: 2px solid #111; }
    .btn-cancel:hover { background: white; }
    .btn-save { background: #111; color: white; border: 3px solid #2ecc71; }
    .btn-save:hover { background: #2ecc71; color: #111; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="jornada">CAPTURAR MARCADOR</div>
    </div>

    <div class="content">
      <button type="button" class="top-btn" onclick="location.href='tabla-posiciones.html'">REGRESAR</button>

      <h1>Cargar resultados de partido</h1>
      <p class="subtitle">Club Deportivo León Saltillo</p>

      <form id="formResultados">
        <div class="partido-section">
          <label>Selecciona el Partido:</label>
          <select id="partido" required onchange="actualizarNombres()">
            <option value="">Cargando partidos pendientes...</option>
          </select>
        </div>

        <div class="goles-section">
          <div class="goles-grid">
            <div class="goles-input-group">
              <div class="equipo-label" id="labelLocal">LOCAL</div>
              <input type="number" class="goles-input" id="golesLocal" min="0" max="99" value="0" required>
            </div>

            <div class="vs-divider">VS</div>

            <div class="goles-input-group">
              <div class="equipo-label" id="labelVisitante">VISITANTE</div>
              <input type="number" class="goles-input" id="golesVisitante" min="0" max="99" value="0" required>
            </div>
          </div>
        </div>

        <div class="btn-row">
          <button type="button" class="btn btn-cancel" onclick="location.href='tabla-posiciones.html'">Cancelar</button>
          <button type="submit" class="btn btn-save">Guardar Resultado</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let partidosData = [];

    // 1. Cargar los partidos que no se han jugado
    document.addEventListener("DOMContentLoaded", async () => {
      const selectPartido = document.getElementById('partido');
      try {
        const response = await fetch('obtener_partidos_pendientes.php');
        const result = await response.json();

        if (result.success) {
          partidosData = result.data;
          selectPartido.innerHTML = '<option value="">Selecciona un partido</option>';
          
          if(partidosData.length === 0) {
              selectPartido.innerHTML = '<option value="">No hay partidos pendientes</option>';
          } else {
              partidosData.forEach(p => {
                selectPartido.innerHTML += `<option value="${p.IdPartido}">${p.Local} vs ${p.Visitante}</option>`;
              });
          }
        }
      } catch (error) {
        console.error("Error:", error);
      }
    });

    // 2. Cambiar los nombres de "LOCAL" y "VISITANTE" por los reales
    function actualizarNombres() {
        const select = document.getElementById('partido');
        const idSeleccionado = select.value;
        const partido = partidosData.find(p => p.IdPartido == idSeleccionado);
        
        if(partido) {
            document.getElementById('labelLocal').innerText = partido.Local;
            document.getElementById('labelVisitante').innerText = partido.Visitante;
        } else {
            document.getElementById('labelLocal').innerText = "LOCAL";
            document.getElementById('labelVisitante').innerText = "VISITANTE";
        }
    }

    // 3. Enviar a guardar
    document.getElementById('formResultados').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const id_partido = document.getElementById('partido').value;
      const goles_local = document.getElementById('golesLocal').value;
      const goles_visitante = document.getElementById('golesVisitante').value;

      if (!id_partido) {
          alert("⚠️ Selecciona un partido primero.");
          return;
      }

      try {
        const response = await fetch('guardar_resultado.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id_partido, goles_local, goles_visitante })
        });

        const result = await response.json();

        if (result.success) {
          alert('✅ ' + result.mensaje);
          location.href = 'tabla-posiciones.html'; // Te regresa a ver los puntos sumados
        } else {
          alert('🚫 Error: ' + result.mensaje);
        }
      } catch (error) {
        alert('🚫 Error de conexión al guardar el resultado.');
      }
    });
  </script>
</body>
</html>
