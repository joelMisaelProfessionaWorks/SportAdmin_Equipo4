<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago en Abonos - SportAdmin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: 
        linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.7) 100%),
        repeating-linear-gradient(0deg, #27ae60 0px, #27ae60 40px, #2ecc71 40px, #2ecc71 80px);
      font-family: 'Rajdhani', sans-serif;
    }

    .container {
      width: 950px;
      background: rgba(52, 195, 143, 0.95);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      border: 3px solid #5060cc;
    }

    .header {
      background: #111;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-header {
      background: rgba(255,255,255,0.9);
      color: #111;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .btn-acreditar {
      background: #2ecc71;
      color: #111;
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .jornada {
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    .content {
      padding: 40px 60px;
      position: relative;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      color: #111;
      text-align: center;
      margin-bottom: 5px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .subtitle {
      color: #1a1a1a;
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 30px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #1a1a1a;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    select, input[type="date"] {
      width: 100%;
      background: white;
      border: 2px solid #111;
      border-radius: 8px;
      padding: 12px 14px;
      color: #111;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      outline: none;
      cursor: pointer;
    }

    table {
      width: 100%;
      background: rgba(0,0,0,0.2);
      border-collapse: collapse;
      margin: 30px 0;
    }

    th {
      background: #111;
      color: white;
      padding: 12px;
      font-weight: 700;
      text-align: center;
      font-size: 0.85rem;
    }

    td {
      background: rgba(255,255,255,0.7);
      padding: 14px 12px;
      text-align: center;
      color: #111;
      font-weight: 600;
      border: 2px solid rgba(0,0,0,0.1);
    }

    tr:hover td {
      background: rgba(255,255,255,0.9);
    }

    .btn-seleccionar {
      background: #111;
      color: white;
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.3s;
    }

    .btn-seleccionar:hover {
      background: #2ecc71;
      color: #111;
    }

    .btn-generar {
      width: 100%;
      padding: 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      background: #111;
      color: white;
      border: 3px solid #2ecc71;
    }

    .btn-generar:hover {
      background: #2ecc71;
      color: #111;
    }

    /* Balón decorativo */
    .ball {
      position: absolute;
      left: 20px;
      bottom: 20px;
      width: 100px;
      opacity: 0.2;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="btn-header" onclick="location.href='pago-inscripcion.html'">cancelar</button>
      <div class="jornada">JORNADA 1</div>
      <button class="btn-acreditar" onclick="acreditar()">Acreditar</button>
    </div>

    <div class="content">
      <!-- Balón SVG -->
      <svg class="ball" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="95" fill="white" stroke="#111" stroke-width="6"/>
        <polygon points="100,40 134,63 121,102 79,102 66,63" fill="#111"/>
      </svg>

      <h1>Pago en abonos</h1>
      <p class="subtitle">Club Deportivo León Saltillo</p>

      <form id="formAbonos">
        <div class="form-grid">
          <div class="form-group">
            <label>Equipo</label>
            <select id="equipo" required>
              <option value="">Selecciona</option>
              <option value="xolos">XOLOS BELLAVISTA</option>
              <option value="halcones">Halcones Fundadores</option>
              <option value="tigres">Tigres Rayados</option>
            </select>
          </div>

          <div class="form-group">
            <label>Parcialidades</label>
            <select id="parcialidades" onchange="calcularMonto()" required>
              <option value="">Selecciona</option>
              <option value="2">1 A 6 JORNADAS</option>
              <option value="3">1 A 4 JORNADAS</option>
              <option value="4">1 A 3 JORNADAS</option>
            </select>
          </div>

          <div class="form-group">
            <label>Fecha</label>
            <input type="date" id="fecha" required>
          </div>
        </div>

        <table id="tablaParcialidades">
          <thead>
            <tr>
              <th>Equipo</th>
              <th>Parcialidades</th>
              <th>Seleccionar</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>XOLOS BELLAVISTA</td>
              <td>1 A 6 JORNADAS</td>
              <td><button type="button" class="btn-seleccionar" onclick="seleccionarParcialidad(this)">Seleccionar</button></td>
            </tr>
          </tbody>
        </table>

        <button type="submit" class="btn-generar">
          Generar recibo
        </button>
      </form>
    </div>
  </div>

  <script>
    // Fecha actual
    document.getElementById('fecha').valueAsDate = new Date();

    let montoSeleccionado = 0;

    function calcularMonto() {
      const parcialidades = document.getElementById('parcialidades').value;
      const total = 1500;
      
      if (parcialidades === '2') {
        montoSeleccionado = total / 6; // ~$250 por jornada
      } else if (parcialidades === '3') {
        montoSeleccionado = total / 4; // $375 por parcialidad
      } else if (parcialidades === '4') {
        montoSeleccionado = total / 3; // $500 por parcialidad
      }
    }

    function seleccionarParcialidad(btn) {
      // Remover selección previa
      document.querySelectorAll('.btn-seleccionar').forEach(b => {
        b.textContent = 'Seleccionar';
        b.style.background = '#111';
      });
      
      // Seleccionar actual
      btn.textContent = '✓ Seleccionado';
      btn.style.background = '#2ecc71';
    }

    function acreditar() {
      const equipo = document.getElementById('equipo').value;
      if (!equipo) {
        alert('⚠️ Selecciona un equipo primero');
        return;
      }
      alert('✅ Parcialidad creada correctamente!');
    }

    document.getElementById('formAbonos').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const equipo = document.getElementById('equipo').options[document.getElementById('equipo').selectedIndex].text;
      const parcialidades = document.getElementById('parcialidades').options[document.getElementById('parcialidades').selectedIndex].text;
      const fecha = document.getElementById('fecha').value;

      if (montoSeleccionado === 0) {
        alert('⚠️ Selecciona las parcialidades');
        return;
      }

      alert(`✅ Recibo de abono generado\n\nEquipo: ${equipo}\nParcialidad: ${parcialidades}\nMonto del abono: $${montoSeleccionado.toFixed(2)}\nFecha: ${fecha}\n\n📱 Enviando recibo por WhatsApp...`);
      
      location.href = 'registro-pagos.html';
    });
  </script>
</body>
</html>
