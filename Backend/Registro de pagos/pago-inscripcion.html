<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago de Inscripción - SportAdmin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: 
        linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.7) 100%),
        repeating-linear-gradient(0deg, #27ae60 0px, #27ae60 40px, #2ecc71 40px, #2ecc71 80px);
      font-family: 'Rajdhani', sans-serif;
    }

    .container {
      width: 900px;
      background: rgba(52, 195, 143, 0.95);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      border: 3px solid #5060cc;
    }

    .header {
      background: #111;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      gap: 8px;
    }

    .btn-header {
      background: rgba(255,255,255,0.9);
      color: #111;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .btn-header:hover {
      background: white;
    }

    .btn-acreditar {
      background: #2ecc71;
      color: #111;
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .btn-acreditar:hover {
      background: #27ae60;
    }

    .jornada {
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    .content {
      padding: 50px 70px;
      position: relative;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.6rem;
      color: #111;
      text-align: center;
      margin-bottom: 5px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .subtitle {
      color: #1a1a1a;
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 40px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #1a1a1a;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    select, input[type="date"] {
      width: 100%;
      background: white;
      border: 2px solid #111;
      border-radius: 8px;
      padding: 14px 18px;
      color: #111;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      outline: none;
      cursor: pointer;
    }

    .monto-box {
      background: rgba(0,0,0,0.3);
      border: 3px solid #111;
      border-radius: 12px;
      padding: 25px;
      text-align: center;
      margin: 30px 0;
    }

    .monto-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .monto-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      color: #111;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .btn-row {
      display: flex;
      gap: 20px;
      margin-top: 40px;
    }

    .btn {
      flex: 1;
      padding: 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-abonar {
      background: rgba(255,255,255,0.8);
      color: #111;
      border: 2px solid #111;
    }

    .btn-abonar:hover {
      background: white;
    }

    .btn-generar {
      background: #111;
      color: white;
      border: 3px solid #2ecc71;
    }

    .btn-generar:hover {
      background: #2ecc71;
      color: #111;
    }

    /* Balón decorativo */
    .ball {
      position: absolute;
      left: 20px;
      bottom: 20px;
      width: 100px;
      opacity: 0.2;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <button class="btn-header" onclick="location.href='registro-pagos.html'">cancelar</button>
      </div>
      <div class="jornada">JORNADA 3</div>
      <button class="btn-acreditar" onclick="acreditar()">Acreditar</button>
    </div>

    <div class="content">
      <!-- Balón SVG -->
      <svg class="ball" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="95" fill="white" stroke="#111" stroke-width="6"/>
        <polygon points="100,40 134,63 121,102 79,102 66,63" fill="#111"/>
      </svg>

      <h1>Pago de inscripcion</h1>
      <p class="subtitle">Club Deportivo León Saltillo</p>

      <form id="formInscripcion">
        <div class="form-group">
          <label>Equipo</label>
          <select id="equipo" required>
            <option value="">Selecciona un equipo</option>
            <option value="xolos">XOLOS BELLAVISTA</option>
            <option value="halcones">Halcones Fundadores</option>
            <option value="tigres">Tigres Rayados</option>
            <option value="leones">Leones FC</option>
          </select>
        </div>

        <div class="form-group">
          <label>Fecha</label>
          <input type="date" id="fecha" required>
        </div>

        <div class="monto-box">
          <div class="monto-label">PAGA $1500 PESOS</div>
          <div class="monto-value">$1,500</div>
        </div>

        <div class="btn-row">
          <button type="button" class="btn btn-abonar" onclick="location.href='pago-abonos.html'">
            Abonar inscripción
          </button>
          <button type="submit" class="btn btn-generar">
            Generar recibo de pago
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('fecha').valueAsDate = new Date();
      cargarEquipos();
    });

    // Función para cargar los equipos desde la BD (necesitaremos crear obtener_equipos.php)
    async function cargarEquipos() {
      const selectEquipo = document.getElementById('equipo');
      try {
        // Asumimos que crearemos un endpoint para obtener los equipos
        const response = await fetch('obtener_equipos.php');
        const result = await response.json();

        if (result.success) {
          selectEquipo.innerHTML = '<option value="">Selecciona un equipo</option>';
          result.data.forEach(equipo => {
            selectEquipo.innerHTML += `<option value="${equipo.IdEquipo}">${equipo.Equipo}</option>`;
          });
        } else {
          console.error("Error al cargar equipos:", result.mensaje);
        }
      } catch (error) {
        console.error("Error de red:", error);
      }
    }

    function acreditar() {
      document.getElementById('formInscripcion').dispatchEvent(new Event('submit'));
    }

    document.getElementById('formInscripcion').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const equipoSelect = document.getElementById('equipo');
      const equipo_id = equipoSelect.value;
      const equipo_nombre = equipoSelect.options[equipoSelect.selectedIndex].text;
      const fecha = document.getElementById('fecha').value;

      if (!equipo_id) {
          alert("⚠️ Selecciona un equipo primero.");
          return;
      }

      try {
        const response = await fetch('guardar_inscripcion.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ equipo_id, fecha })
        });

        const result = await response.json();

        if (result.success) {
          alert(`✅ Recibo de pago generado\n\nEquipo: ${equipo_nombre}\nConcepto: Inscripción\nMonto: $1,500\nFecha: ${fecha}\n\n📱 Enviando recibo por WhatsApp...`);
          location.href = 'registro-pagos.html';
        } else {
          alert('🚫 Error: ' + result.mensaje);
        }
      } catch (error) {
        alert('🚫 Error de conexión al guardar el pago.');
        console.error(error);
      }
    });
  </script>
</body>
</html>
